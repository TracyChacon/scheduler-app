services:
  # 🌐 Next.js Application Layer Service
  web:
    build:
      context: .
      target: development
    container_name: scheduler_web
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      # Tells Turbopack to watch files reliably in Docker volumes
      - WATCHPACK_POLLING=true 
      # ✨ Adds explicit hot-reload handling for Next.js Rust-based Turbopack layer
      - NEXT_DEV_TURBO_POLLING=true
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres_secure_dev_pass@db:5432/scheduler_db
    depends_on:
      db:
        condition: service_healthy

  # 🐘 PostgreSQL Database Engine Service Layer
  db:
    image: postgres:18-alpine
    container_name: scheduler_db_container
    ports:
      - "5432:5432" 
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_secure_dev_pass
      - POSTGRES_DB=scheduler_db
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scheduler_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local